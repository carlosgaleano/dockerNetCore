services:

  api:
    build:
      context: ./src/Api
      dockerfile: Dockerfile
    container_name: api
    ports:
      - "${API_HTTP_PORT}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ConnectionStrings__SqlServer2=Server=${SQLSERVER_HOST:-sqlserver},1433;Database=${SQLSERVER_DB_2};User Id=${SQLSERVER_DB_2_USER};Password=${SQLSERVER_2_PASSWORD};TrustServerCertificate=True;Encrypt=False;
      - ConnectionStrings__SqlServer=Server=sqlserver,1433;Database=${SQLSERVER_DB};User Id=sa;Password=${SQLSERVER_SA_PASSWORD};TrustServerCertificate=True;Encrypt=False;
      - ConnectionStrings__Postgres=Host=${POSTGRES_HOST:-host.docker.internal};Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}      
      - JWT_KEY=${JWT_KEY}
      - JWT_ISSUER=MiApi
      - JWT_AUDIENCE=MiApiUsuarios
      - JWT_EXPIRES_MINUTES=60


    depends_on:
      sqlserver:
        condition: service_healthy  
    networks:
      - backend
      - laravel

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SQLSERVER_SA_PASSWORD}
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${SQLSERVER_SA_PASSWORD} -Q 'SELECT 1' -No"]
      interval: 10s
      timeout: 5s
      retries: 30
    command: >
      /bin/bash -c "
      /opt/mssql/bin/sqlservr &
      pid=$$!;
      for i in {1..60}; do
        /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${SQLSERVER_SA_PASSWORD} -Q 'SELECT 1' -No && break || sleep 2;
      done;
      wait $$pid
      "
    networks:
      backend:
        aliases: [sqlserver]

volumes:
  sqlserver_data:

networks:
  backend:
    driver: bridge
  laravel:
    external: true   
 
